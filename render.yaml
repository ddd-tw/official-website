# Render Blueprint — DDD TW 官網(free tier)
# 用法:Render Dashboard → New → Blueprint → 選這個 repo
# DB 用 Neon free(Render 免費 Postgres 30 天會過期刪資料,勿用)
# 完整步驟見 docs/deploy-render-neon.md

services:
  # ── API(Bun + Hono,Docker)──────────────────────────────
  - type: web
    name: dddtw-api
    runtime: docker
    dockerfilePath: ./Dockerfile.api
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        sync: false # 部署時貼上 Neon 的 pooled connection string(含 ?sslmode=require)
      - key: ADMIN_TOKEN
        generateValue: true
      - key: TICKET_SECRET
        generateValue: true # 注意:重新產生會使已發出的票券 QR 全部失效
      - key: CORS_ORIGIN
        value: https://dddtw-web.onrender.com

  # ── Web(靜態 SPA + /api 代理)────────────────────────────
  - type: web
    name: dddtw-web
    runtime: static
    buildCommand: curl -fsSL https://bun.sh/install | bash && export BUN_INSTALL="$HOME/.bun" && export PATH="$BUN_INSTALL/bin:$PATH" && bun install --frozen-lockfile && bun run --cwd apps/web build
    staticPublishPath: apps/web/dist
    routes:
      # 若 dddtw-api 子網域被占用、實際網址有後綴,這裡要跟著改
      - type: rewrite
        source: /api/*
        destination: https://dddtw-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
